name: Changeset Check

# Fail-closed gate: any PR that touches publishable source must include a
# changeset. Doc-only / chore-only PRs (markdown, CI config, the .changeset
# folder itself, dotfiles, lockfile) are exempt. When in doubt we REQUIRE a
# changeset â€” the exemption list is intentionally narrow so it can't be abused
# as a bypass.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changeset:
    name: Verify changeset present
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for changeset
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          echo "Diffing against origin/$BASE_REF"
          CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          # A new changeset entry = any added .changeset/*.md that is not README.
          NEW_CHANGESETS=$(echo "$CHANGED" \
            | { grep -E '^\.changeset/.+\.md$' || true; } \
            | { grep -vE '^\.changeset/README\.md$' || true; })

          if [ -n "$NEW_CHANGESETS" ]; then
            echo "âś… Changeset found:"
            echo "$NEW_CHANGESETS"
            exit 0
          fi

          # No changeset present â€” decide whether one is REQUIRED.
          # Exempt (release-irrelevant) paths. Everything else is publishable
          # and therefore requires a changeset.
          #   - the .changeset/ folder itself (config, README)
          #   - any markdown (docs, CLAUDE.md, READMEs, CHANGELOGs)
          #   - CI / GitHub config under .github/
          #   - repo dotfiles & editor/tooling config
          #   - the lockfile
          PUBLISHABLE=$(echo "$CHANGED" | { grep -vE \
            '^(\.changeset/|.*\.md$|\.github/|\.husky/|\.vscode/|\.[^/]+$|.*/\.[^/]+$|pnpm-lock\.yaml$|biome\.json$|knip\.json$|tsconfig.*\.json$)' \
            || true; })

          if [ -z "$PUBLISHABLE" ]; then
            echo "âś… No publishable changes detected (docs/chore-only) â€” changeset not required."
            exit 0
          fi

          echo "âťŚ Publishable changes detected with no changeset:"
          echo "$PUBLISHABLE"
          echo ""
          echo "Add one with:  pnpm changeset"
          echo "If this PR truly needs no release, add an empty changeset:  pnpm changeset --empty"
          exit 1
